<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Financing Ops Pipeline</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Inter,sans-serif;background:#f1f5f9}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect}=React;

// ✅ ÚNICA MUDANÇA: usar o Worker como base, não o Jira diretamente
const WORKER="https://lively-paper-ef9a.luiza-buckup.workers.dev";
const JIRA="https://kavak.atlassian.net"; // só pra links
const SIM_TYPE="13327",CON_TYPE="10478",PROJ="BSO";

const SC=[
  {id:"em_andamento",label:"Em Andamento",icon:"🔄",bg:"#f0fdf4",bd:"#bbf7d0",bk:"#16a34a",st:["em andamento","tarefas pendentes"]},
  {id:"envio_proposta",label:"Envio de Proposta",icon:"📤",bg:"#fefce8",bd:"#fde68a",bk:"#d97706",st:["envio de proposta"]},
  {id:"analise_docs",label:"Análise de Docs",icon:"🔍",bg:"#eff6ff",bd:"#bfdbfe",bk:"#2563eb",st:["análise documentos","analise documentos"]},
  {id:"ag_cliente",label:"Aguardando Cliente",icon:"👤",bg:"#fdf2f8",bd:"#f9a8d4",bk:"#be185d",st:["pending documentation","waiting for se","aguardando cliente"]},
];
const CC=[
  {id:"em_andamento",label:"Em Andamento",icon:"🔄",bg:"#f0fdf4",bd:"#bbf7d0",bk:"#16a34a",st:["em andamento","tarefas pendentes"]},
  {id:"contrato_ass",label:"Contrato Assinado",icon:"✅",bg:"#dcfce7",bd:"#86efac",bk:"#15803d",st:["contract signed","contrato assinado"]},
  {id:"aguardando",label:"Aguardando Cliente",icon:"⏳",bg:"#fef3c7",bd:"#fcd34d",bk:"#d97706",st:["aguardando se","aguardando finops","awaiting financial (fiscal)","aguardando financial","aguardando bko","aguardando entrega","se replied"]},
];
const IGN=["cancelado","cancelada","concluído","concluido","done","closed","resolvido","resolved","fechada"];
function cid(s,cols){const v=(s||"").trim().toLowerCase();if(IGN.includes(v))return null;for(const c of cols)if(c.st.includes(v))return c.id;return cols[0].id;}
function pcs(raw){const m=f=>{const r=(raw||"").match(new RegExp(`\\*${f}:\\*\\s*([^\\*•\\|]+)`));return r?r[1].trim().replace(/<[^>]+>/g,"").trim():null;};const cl=m("Cliente"),pl=m("Placa"),pg=m("Forma de Pagamento");if(cl)return`${cl}${pl?` · ${pl}`:""}${pg?` · ${pg}`:""}`;return(raw||"").replace(/<[^>]+>/g,"").slice(0,120);}

const SIM=[
  {key:"BSO-193722",summary:"exceção - 495309",status:"ENVIO DE PROPOSTA",assignee:"JOAO RICARDO",created:"2026-03-20T14:54:24.577-0600",updated:"2026-03-20T15:02:52.030-0600",hub:"BOTMAKER"},
  {key:"BSO-193721",summary:"EXCEÇÃO ENTRADA - 486917 - PISO",status:"ENVIO DE PROPOSTA",assignee:"VINICIUS LARANJEIRA",created:"2026-03-20T14:46:12.316-0600",updated:"2026-03-20T15:01:07.479-0600",hub:"KAVAK CITY"},
  {key:"BSO-193686",summary:"Estimativa 26468527 - TERCIO SANTOS RIBEIRO",status:"Em andamento",assignee:"Athos Medeiros Cunha",created:"2026-03-20T09:54:51.644-0600",updated:"2026-03-20T14:37:36.710-0600",hub:null},
  {key:"BSO-193664",summary:"Estimativa 26468580 - Willians Roger da Silva",status:"Em andamento",assignee:"Athos Medeiros Cunha",created:"2026-03-19T13:48:02.612-0600",updated:"2026-03-20T14:36:52.598-0600",hub:null},
];
const CON=[
  {key:"BSO-193723",raw:"*Cliente*: Tereza Santos Melo *Placa:* LMP9H35 *Forma de Pagamento:* Financiamento Kuna",status:"Tarefas pendentes",assignee:"VINICIUS LARANJEIRA",created:"2026-03-20T15:07:52.735-0600",updated:"2026-03-20T15:13:26.132-0600"},
  {key:"BSO-193717",raw:"*Cliente*: MARIA DO SOCORRO BARBOSA *Placa:* DFE8C93 *Forma de Pagamento:* Financiamento Kuna",status:"Tarefas pendentes",assignee:"Jose Moura",created:"2026-03-20T14:24:05.728-0600",updated:"2026-03-20T15:15:43.363-0600"},
].map(t=>({...t,summary:pcs(t.raw)}));

const SH=24;
function sla(d,l){const h=(Date.now()-new Date(d))/36e5;return h>l?"breach":h>l*.75?"warning":"ok";}
function fd(d){return d?new Date(d).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"—";}
function ha(d){return d?Math.round((Date.now()-new Date(d))/36e5):null;}
function ini(n=""){return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();}
const AC=["#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6"];
function ac(n=""){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%AC.length;return AC[Math.abs(h)];}
const SLC={ok:{l:"SLA OK",bg:"#d1fae5",c:"#065f46",b:"#6ee7b7"},warning:{l:"SLA Risco",bg:"#fef3c7",c:"#92400e",b:"#fcd34d"},breach:{l:"SLA Violado",bg:"#fee2e2",c:"#991b1b",b:"#fca5a5"}};
const HC={"BOTMAKER":{bg:"#ede9fe",c:"#5b21b6",b:"#c4b5fd"},"KAVAK CITY":{bg:"#dbeafe",c:"#1e40af",b:"#93c5fd"},"SP MARKET":{bg:"#dcfce7",c:"#14532d",b:"#86efac"},"SANTO ANDRÉ":{bg:"#fef3c7",c:"#78350f",b:"#fcd34d"}};

function App(){
  const [search,setSearch]=useState("");
  const [af,setAf]=useState("all");
  const [hf,setHf]=useState("all");
  const [sl,setSl]=useState(SH);
  const [tab,setTab]=useState("sim");
  const [sd,setSd]=useState(SIM);
  const [cd,setCd]=useState(CON);
  const [loading,setLoading]=useState(false);
  const [last,setLast]=useState(null);
  const [toasts,setToasts]=useState([]);

  const toast=(msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);};

  const fetchAll=async()=>{
    setLoading(true);
    try{
      const today=new Date();today.setDate(today.getDate()-30);
      const cutoff=today.toISOString().split("T")[0];
      const jql1=encodeURIComponent(`project=${PROJ} AND issuetype=${SIM_TYPE} AND statusCategory not in ("Done") AND status not in ("Fechada","Cancelado","Cancelada","Closed","Resolved") AND created >= "${cutoff}" ORDER BY created DESC`);
      const jql2=encodeURIComponent(`project=${PROJ} AND issuetype=${CON_TYPE} AND statusCategory not in ("Done") AND status not in ("Fechada","Cancelado","Cancelada","Closed","Resolved") AND created >= "${cutoff}" ORDER BY created DESC`);
      const fields="summary,status,assignee,reporter,created,updated,customfield_22543";

      // ✅ Chamadas agora vão pelo Worker (sem auth no frontend)
      const [r1,r2]=await Promise.all([
        fetch(`${WORKER}/rest/api/3/search/jql?jql=${jql1}&maxResults=100&fields=${fields}`),
        fetch(`${WORKER}/rest/api/3/search/jql?jql=${jql2}&maxResults=100&fields=${fields}`)
      ]);
      const [d1,d2]=await Promise.all([r1.json(),r2.json()]);
      const map=i=>({key:i.key,summary:i.fields?.summary||"",status:i.fields?.status?.name||"",assignee:i.fields?.assignee?.displayName||null,created:i.fields?.created,updated:i.fields?.updated,hub:i.fields?.customfield_22543?.value||null});
      const sim=(d1.issues||[]).map(map);
      const con=(d2.issues||[]).map(i=>({...map(i),summary:pcs(i.fields?.summary||"")}));
      if(sim.length||con.length){setSd(sim);setCd(con);setLast(new Date());toast("✅ Dados atualizados do Jira","ok");}
      else throw new Error("sem dados");
    }catch(e){toast("⚠️ Usando dados locais: "+e.message,"warn");}
    setLoading(false);
  };

  useEffect(()=>{fetchAll();const iv=setInterval(fetchAll,5*60*1000);return()=>clearInterval(iv);},[]);

  const anas=useMemo(()=>Array.from(new Set([...sd,...cd].map(t=>t.assignee).filter(Boolean))).sort(),[sd,cd]);
  const hubs=useMemo(()=>Array.from(new Set(sd.map(t=>t.hub).filter(Boolean))).sort(),[sd]);

  const filt=(arr,isS=true)=>arr.filter(t=>{
    if(af!=="all"&&t.assignee!==af)return false;
    if(isS&&hf!=="all"&&(t.hub||null)!==hf)return false;
    if(search){const q=search.toLowerCase();return[t.key,t.summary,t.assignee,t.hub].some(v=>(v||"").toLowerCase().includes(q));}
    return true;
  });

  const sf=filt(sd,true),cf=filt(cd,false);
  const sg=SC.map(col=>({col,items:sf.filter(t=>cid(t.status,SC)===col.id)}));
  const cg=CC.map(col=>({col,items:cf.filter(t=>cid(t.status,CC)===col.id)}));
  const all=[...sd,...cd];
  const breach=all.filter(t=>sla(t.created,sl)==="breach").length;
  const risk=all.filter(t=>sla(t.created,sl)==="warning").length;

  const Card=({t,showHub=true})=>{
    const s=sla(t.created,sl),sc=SLC[s],h=ha(t.created);
    const hc=showHub&&t.hub?HC[t.hub]:null;
    const cp=e=>{e.stopPropagation();const el=e.currentTarget;try{const ta=document.createElement("textarea");ta.value=t.key;ta.style.cssText="position:fixed;opacity:0";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);}catch(_){}el.textContent="✓";setTimeout(()=>el.textContent="⎘",1200);};
    return(
      <div style={{background:"#f8fafc",border:`1px solid ${sc.b}`,borderRadius:9,padding:"9px 11px",borderLeft:`4px solid ${sc.c}`,marginBottom:6}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <a href={`${JIRA}/browse/${t.key}`} target="_blank" style={{fontWeight:800,color:"#2563eb",fontSize:11,fontFamily:"monospace",textDecoration:"none"}}>{t.key} ↗</a>
            <button onClick={cp} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:4,padding:"1px 5px",fontSize:10,cursor:"pointer",color:"#64748b",fontWeight:600}}>⎘</button>
          </div>
          <span style={{background:sc.bg,color:sc.c,fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:20,border:`1px solid ${sc.b}`,whiteSpace:"nowrap"}}>{sc.l}{h!==null?` · ${h}h`:""}</span>
        </div>
        <div style={{fontSize:11,color:"#334155",marginBottom:4,lineHeight:1.4,fontWeight:500}}>{(t.summary||"").slice(0,100)}{(t.summary||"").length>100?"…":""}</div>
        {hc&&<div style={{marginBottom:4}}><span style={{background:hc.bg,color:hc.c,border:`1px solid ${hc.b}`,fontSize:9,fontWeight:700,padding:"1px 7px",borderRadius:20}}>📍 {t.hub}</span></div>}
        <div style={{display:"flex",alignItems:"center",gap:4,fontSize:9,color:"#64748b",marginBottom:3}}>
          <div style={{width:16,height:16,borderRadius:"50%",background:ac(t.assignee||""),color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:800,flexShrink:0}}>{ini(t.assignee||"")}</div>
          <span>{t.assignee||"—"}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 6px"}}>
          <div style={{fontSize:9,color:"#64748b"}}>🕐 {fd(t.created)}</div>
          <div style={{fontSize:9,color:"#94a3b8"}}>✏️ {fd(t.updated)}</div>
        </div>
      </div>
    );
  };

  const Col=({col,items,showHub=true})=>(
    <div style={{background:"#fff",borderRadius:10,border:`1px solid ${col.bd}`,overflow:"hidden",boxShadow:"0 1px 3px rgba(0,0,0,.05)"}}>
      <div style={{background:col.bg,padding:"8px 12px",borderBottom:`1px solid ${col.bd}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span style={{fontWeight:700,color:"#1e293b",fontSize:11}}>{col.icon} {col.label}</span>
        <span style={{background:col.bk,color:"#fff",borderRadius:20,fontSize:10,fontWeight:700,padding:"2px 8px"}}>{items.length}</span>
      </div>
      <div style={{padding:8,maxHeight:520,overflowY:"auto"}}>
        {items.length===0?<div style={{textAlign:"center",color:"#cbd5e1",fontSize:11,padding:"20px 0"}}>Nenhum ticket</div>:items.map(t=><Card key={t.key} t={t} showHub={showHub}/>)}
      </div>
    </div>
  );

  return(
    <div style={{fontFamily:"Inter,sans-serif",background:"#f1f5f9",minHeight:"100vh",padding:"14px 18px"}}>
      <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:6}}>
        {toasts.map(t=><div key={t.id} style={{padding:"8px 14px",borderRadius:8,fontSize:11,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,.15)",background:t.type==="ok"?"#d1fae5":"#fef3c7",color:t.type==="ok"?"#065f46":"#92400e",border:`1px solid ${t.type==="ok"?"#6ee7b7":"#fcd34d"}`}}>{t.msg}</div>)}
      </div>

      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:17,fontWeight:800,color:"#0f172a"}}>🏦 Financing Ops Pipeline</span>
            <a href={`${JIRA}/jira/servicedesk/projects/BSO/queues/custom/7342`} target="_blank" style={{fontSize:9,background:"#dbeafe",color:"#1e40af",padding:"2px 8px",borderRadius:20,fontWeight:700,textDecoration:"none"}}>Simulação #7342 ↗</a>
            <a href={`${JIRA}/jira/servicedesk/projects/BSO/queues/custom/8400`} target="_blank" style={{fontSize:9,background:"#fce7f3",color:"#be185d",padding:"2px 8px",borderRadius:20,fontWeight:700,textDecoration:"none"}}>Contratos #8400 ↗</a>
          </div>
          <div style={{fontSize:9,color:"#94a3b8",marginTop:2}}>{last?`✅ Jira · ${last.toLocaleTimeString("pt-BR")} · auto-refresh 5min`:"📦 Dados locais — buscando Jira..."}</div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={fetchAll} disabled={loading} style={{padding:"5px 12px",borderRadius:7,border:"1px solid #bbf7d0",background:loading?"#f1f5f9":"#f0fdf4",color:loading?"#94a3b8":"#16a34a",fontSize:10,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>{loading?"⏳ Buscando...":"🔄 Atualizar"}</button>
          <label style={{fontSize:11,color:"#64748b",display:"flex",alignItems:"center",gap:5}}>SLA (h):<input type="number" value={sl} min={1} max={168} onChange={e=>setSl(Number(e.target.value))} style={{width:44,padding:"3px 5px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11}}/></label>
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:7,marginBottom:10}}>
        {[{l:"Simulação",v:sd.length,i:"📊",bg:"#eff6ff",c:"#1d4ed8"},{l:"Contratos",v:cd.length,i:"📋",bg:"#fdf2f8",c:"#be185d"},{l:"Ag. Cliente",v:cg.find(g=>g.col.id==="aguardando")?.items.length||0,i:"⏳",bg:"#fefce8",c:"#854d0e"},{l:"Contrato ✅",v:cg.find(g=>g.col.id==="contrato_ass")?.items.length||0,i:"✅",bg:"#f0fdf4",c:"#15803d"},{l:"SLA Risco",v:risk,i:"🟡",bg:"#fefce8",c:"#854d0e"},{l:"SLA Violado",v:breach,i:"🔴",bg:"#fff1f2",c:"#9f1239"}].map(m=>(
          <div key={m.l} style={{background:m.bg,borderRadius:9,padding:"9px 11px",border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:14}}>{m.i}</div>
            <div style={{fontSize:20,fontWeight:800,color:m.c,lineHeight:1.1,marginTop:1}}>{m.v}</div>
            <div style={{fontSize:9,color:"#64748b",marginTop:1,fontWeight:500}}>{m.l}</div>
          </div>
        ))}
      </div>

      {hubs.length>0&&<div style={{background:"#fff",borderRadius:9,padding:"8px 12px",marginBottom:10,border:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <span style={{fontSize:10,fontWeight:700,color:"#475569"}}>📍 Hub</span>
        {hubs.map(h=>{const c=HC[h]||{bg:"#f1f5f9",c:"#475569",b:"#e2e8f0"};return<button key={h} onClick={()=>setHf(hf===h?"all":h)} style={{padding:"2px 9px",borderRadius:20,border:`1px solid ${c.b}`,background:hf===h?c.c:c.bg,color:hf===h?"#fff":c.c,fontSize:10,fontWeight:700,cursor:"pointer"}}>{h} <span style={{opacity:.7}}>({sd.filter(t=>t.hub===h).length})</span></button>;})}
      </div>}

      <div style={{background:"#fff",borderRadius:9,padding:"9px 12px",marginBottom:12,border:"1px solid #e2e8f0",display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Chave, resumo, cliente, responsável..." style={{flex:1,minWidth:150,padding:"6px 10px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:11,background:"#f8fafc"}}/>
        <select value={af} onChange={e=>setAf(e.target.value)} style={{padding:"6px 9px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:11,background:"#f8fafc",color:"#334155",cursor:"pointer",minWidth:160}}>
          {["all",...anas].map(a=><option key={a} value={a}>{a==="all"?"👤 Todos os analistas":a}</option>)}
        </select>
        {(af!=="all"||hf!=="all"||search)&&<button onClick={()=>{setAf("all");setHf("all");setSearch("");}} style={{padding:"5px 10px",borderRadius:7,border:"1px solid #fca5a5",background:"#fff1f2",color:"#991b1b",fontSize:10,fontWeight:600,cursor:"pointer"}}>✕ Limpar</button>}
        <span style={{fontSize:9,color:"#94a3b8"}}>{sf.length+cf.length} tickets</span>
      </div>

      <div style={{display:"flex",gap:6,marginBottom:12}}>
        {[["sim","📊 Simulação"],["contract","📋 Contratos"],["all","⊞ Visão Completa"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"6px 14px",borderRadius:8,border:"1px solid #e2e8f0",background:tab===id?"#0f172a":"#fff",color:tab===id?"#fff":"#475569",fontWeight:600,fontSize:11,cursor:"pointer"}}>{label}</button>
        ))}
      </div>

      {(tab==="sim"||tab==="all")&&(
        <div style={{marginBottom:tab==="all"?20:0}}>
          {tab==="all"&&<div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8}}>📊 SIMULAÇÃO — Fila #7342</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
            {sg.map(({col,items})=><Col key={col.id} col={col} items={items} showHub={true}/>)}
          </div>
        </div>
      )}
      {(tab==="contract"||tab==="all")&&(
        <div>
          {tab==="all"&&<div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:8}}>📋 CONTRATOS — Fila #8400</div>}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
            {cg.map(({col,items})=><Col key={col.id} col={col} items={items} showHub={false}/>)}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
